<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Image Converter - Convert PNG, JPG, WEBP | Free Online Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            min-height: 100vh;
            padding: 16px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #0f766e 100%);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
            text-align: center;
        }

        body.dark-mode .card {
            background: #1e293b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: #1E3A8A;
            font-size: 24px;
        }

        body.dark-mode h1 {
            color: #0D9488;
        }

        .sub {
            color: #0D9488;
            font-size: 12px;
            font-weight: 500;
        }

        body.dark-mode .sub {
            color: #5eead4;
        }

        .dark-toggle {
            background: #f1f5f9;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        body.dark-mode .dark-toggle {
            background: #334155;
            color: white;
        }

        .upload-area {
            border: 2px dashed #0D9488;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            background: #f8fafc;
        }

        body.dark-mode .upload-area {
            background: #334155;
            border-color: #5eead4;
        }

        .upload-area:hover {
            background: #f0fdf4;
            border-color: #1E3A8A;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-text {
            color: #1E3A8A;
            font-weight: 500;
        }

        body.dark-mode .upload-text {
            color: #5eead4;
        }

        .upload-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }

        .controls-section {
            display: none;
            margin-top: 24px;
        }

        .controls-section.show {
            display: block;
        }

        .compare-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
        }

        .compare-box {
            flex: 1;
            min-width: 200px;
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }

        body.dark-mode .compare-box {
            background: #334155;
        }

        .compare-title {
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 12px;
            font-size: 14px;
        }

        body.dark-mode .compare-title {
            color: #5eead4;
        }

        .preview-img {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 12px;
            background: #e2e8f0;
        }

        .convert-section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        body.dark-mode .convert-section {
            background: #334155;
        }

        .convert-label {
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 12px;
            font-size: 14px;
            display: block;
        }

        body.dark-mode .convert-label {
            color: #5eead4;
        }

        .format-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .format-btn {
            background: #e2e8f0;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            color: #1E3A8A;
            cursor: pointer;
            transition: 0.2s;
        }

        body.dark-mode .format-btn {
            background: #475569;
            color: #5eead4;
        }

        .format-btn.active {
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            color: white;
        }

        .quality-section {
            margin-top: 20px;
            display: none;
        }

        .quality-section.show {
            display: block;
        }

        .quality-label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: #1E3A8A;
            font-size: 13px;
            margin-bottom: 8px;
        }

        body.dark-mode .quality-label {
            color: #5eead4;
        }

        .quality-value {
            color: #0D9488;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #0D9488;
            border-radius: 50%;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            background: #0D9488;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn.convert {
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
        }

        .action-btn.download {
            background: #22c55e;
        }

        .action-btn.clear {
            background: #dc2626;
        }

        .info-text {
            text-align: center;
            color: #0D9488;
            font-size: 12px;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
        }

        body.dark-mode .info-text {
            background: #0f766e;
            color: #ccfbf1;
        }

        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { max-width: 800px; margin: 0 auto; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <div><h1>🖼️ Image Converter</h1><p class="sub">Convert PNG, JPG, JPEG, WEBP, BMP</p></div>
            <button class="dark-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
        </div>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">Click to upload an image</div>
            <div class="upload-hint">PNG, JPG, JPEG, WEBP, BMP (Max 10MB)</div>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
        </div>

        <div class="controls-section" id="controlsSection">
            <div class="compare-container">
                <div class="compare-box"><div class="compare-title">📸 Original</div><img id="originalImg" class="preview-img" alt="Original"><div id="originalFormat" class="dimensions" style="font-size:11px; margin-top:8px;"></div></div>
                <div class="compare-box"><div class="compare-title">✨ Converted</div><img id="resultImg" class="preview-img" alt="Converted"><div id="convertedFormat" class="dimensions" style="font-size:11px; margin-top:8px;"></div></div>
            </div>

            <div class="convert-section">
                <label class="convert-label">🎯 Convert to Format</label>
                <div class="format-buttons">
                    <button class="format-btn" data-format="image/png">PNG</button>
                    <button class="format-btn" data-format="image/jpeg">JPEG</button>
                    <button class="format-btn" data-format="image/webp">WEBP</button>
                    <button class="format-btn" data-format="image/bmp">BMP</button>
                </div>
                <div class="quality-section" id="qualitySection">
                    <div class="quality-label"><span>📊 Quality (JPEG/WEBP)</span><span class="quality-value" id="qualityVal">90</span></div>
                    <input type="range" id="quality" min="10" max="100" value="90" oninput="updateQuality()">
                </div>
            </div>

            <div class="action-buttons">
                <button class="action-btn convert" id="convertBtn">🔄 Convert Image</button>
                <button class="action-btn download" id="downloadBtn" style="display:none;">⬇️ Download Converted Image</button>
                <button class="action-btn clear" onclick="clearAll()">🗑️ Clear All</button>
            </div>
        </div>

        <div class="info-text">
            💡 Upload image → Select target format → Click Convert → Download converted image!
        </div>
    </div>
</div>

<script>
    let originalFile = null;
    let originalURL = null;
    let convertedBlob = null;
    let convertedURL = null;
    let selectedFormat = 'image/png';
    let currentQuality = 90;

    function handleImageUpload(event) {
        let file = event.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            showToast('Please upload an image file!', '#dc2626');
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            showToast('Image too large! Max 10MB', '#dc2626');
            return;
        }
        originalFile = file;
        if (originalURL) URL.revokeObjectURL(originalURL);
        originalURL = URL.createObjectURL(file);
        let img = document.getElementById('originalImg');
        img.src = originalURL;
        let formatName = file.type.split('/')[1].toUpperCase();
        document.getElementById('originalFormat').innerHTML = `Format: ${formatName} | ${(file.size/1024).toFixed(1)} KB`;
        document.getElementById('resultImg').src = '';
        document.getElementById('controlsSection').classList.add('show');
        document.getElementById('downloadBtn').style.display = 'none';
        if (convertedURL) URL.revokeObjectURL(convertedURL);
        convertedBlob = null;
        showToast('Image loaded! Select format and click Convert.', '#0D9488');
    }

    // Format selection
    document.querySelectorAll('.format-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedFormat = this.getAttribute('data-format');
            // Show quality slider only for JPEG and WEBP
            if (selectedFormat === 'image/jpeg' || selectedFormat === 'image/webp') {
                document.getElementById('qualitySection').classList.add('show');
            } else {
                document.getElementById('qualitySection').classList.remove('show');
            }
        });
    });

    // Set default active format
    document.querySelector('.format-btn[data-format="image/png"]').classList.add('active');

    function updateQuality() {
        currentQuality = document.getElementById('quality').value;
        document.getElementById('qualityVal').innerText = currentQuality;
    }

    async function convertImage() {
        if (!originalFile) {
            showToast('Please upload an image first!', '#dc2626');
            return;
        }

        let convertBtn = document.getElementById('convertBtn');
        convertBtn.disabled = true;
        convertBtn.innerText = '⏳ Converting...';

        try {
            let img = new Image();
            img.src = originalURL;
            await new Promise((resolve) => { img.onload = resolve; });
            
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            let quality = (selectedFormat === 'image/jpeg' || selectedFormat === 'image/webp') ? currentQuality / 100 : undefined;
            let mimeType = selectedFormat;
            
            canvas.toBlob(function(blob) {
                convertedBlob = blob;
                if (convertedURL) URL.revokeObjectURL(convertedURL);
                convertedURL = URL.createObjectURL(blob);
                document.getElementById('resultImg').src = convertedURL;
                let formatName = mimeType.split('/')[1].toUpperCase();
                document.getElementById('convertedFormat').innerHTML = `Format: ${formatName} | ${(blob.size/1024).toFixed(1)} KB`;
                document.getElementById('downloadBtn').style.display = 'block';
                showToast('Conversion complete!', '#22c55e');
            }, mimeType, quality);
        } catch (error) {
            showToast('Error converting image. Try again.', '#dc2626');
        } finally {
            convertBtn.disabled = false;
            convertBtn.innerText = '🔄 Convert Image';
        }
    }

    function downloadConverted() {
        if (!convertedBlob) {
            showToast('No converted image! Click Convert first.', '#dc2626');
            return;
        }
        let link = document.createElement('a');
        let name = originalFile.name.split('.');
        let ext = name.pop();
        let newExt = selectedFormat.split('/')[1];
        link.download = name.join('.') + '_converted.' + newExt;
        link.href = convertedURL;
        link.click();
        showToast('✅ Download started!', '#0D9488');
    }

    function clearAll() {
        document.getElementById('fileInput').value = '';
        document.getElementById('controlsSection').classList.remove('show');
        if (originalURL) URL.revokeObjectURL(originalURL);
        if (convertedURL) URL.revokeObjectURL(convertedURL);
        originalFile = null;
        convertedBlob = null;
        showToast('Cleared!', '#dc2626');
    }

    function showToast(msg, bgColor) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = bgColor;
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '50px';
        toast.style.fontSize = '14px';
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '1000';
        toast.style.boxShadow = '0 5px 15px rgba(0,0,0,0.2)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        let btn = document.querySelector('.dark-toggle');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
            localStorage.setItem('darkMode', 'enabled');
        } else {
            btn.innerHTML = '🌙 Dark Mode';
            localStorage.setItem('darkMode', 'disabled');
        }
    }

    function loadDarkMode() {
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
            document.querySelector('.dark-toggle').innerHTML = '☀️ Light Mode';
        }
    }

    document.getElementById('convertBtn').addEventListener('click', convertImage);
    document.getElementById('downloadBtn').addEventListener('click', downloadConverted);

    window.onload = loadDarkMode;
</script>
</body>
</html>
