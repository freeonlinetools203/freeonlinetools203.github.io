<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Unit Converter - Free Online Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #1E3A8A;
            font-size: 28px;
            text-align: center;
            margin-bottom: 6px;
        }

        .sub {
            text-align: center;
            color: #0D9488;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
        }

        .category-section {
            margin-bottom: 24px;
        }

        .category-label {
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 10px;
            font-size: 15px;
            display: block;
        }

        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .cat-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            color: #1E3A8A;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 70px;
            text-align: center;
        }

        .cat-btn.active {
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            color: white;
        }

        .amount-section {
            background: #f0fdf4;
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 24px;
        }

        .amount-label {
            font-weight: 700;
            color: #1E3A8A;
            font-size: 16px;
            margin-bottom: 10px;
            display: block;
        }

        .amount-input {
            width: 100%;
            padding: 16px;
            font-size: 32px;
            text-align: center;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            font-weight: bold;
            background: white;
            color: #1E3A8A;
        }

        .amount-input:focus {
            outline: none;
            border-color: #0D9488;
        }

        .unit-row {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 16px;
        }

        .unit-card {
            background: #f8fafc;
            padding: 16px;
            border-radius: 20px;
        }

        .unit-label {
            display: block;
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 10px;
            font-size: 15px;
        }

        select {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            font-weight: 500;
            color: #1E3A8A;
        }

        .swap-container {
            display: flex;
            justify-content: center;
            margin: 8px 0 16px;
        }

        .swap-btn {
            background: #0D9488;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .result-box {
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            color: white;
            padding: 28px 20px;
            border-radius: 24px;
            text-align: center;
            margin: 24px 0;
        }

        .result-label {
            font-size: 15px;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .result-amount {
            font-size: 42px;
            font-weight: bold;
            word-break: break-word;
            margin-bottom: 12px;
        }

        .result-unit {
            font-size: 14px;
            opacity: 0.85;
        }

        .convert-btn {
            width: 100%;
            background: #0D9488;
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .info-text {
            text-align: center;
            color: #0D9488;
            font-size: 12px;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 16px;
        }

        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { max-width: 550px; margin: 0 auto; }
            .unit-row { flex-direction: row; gap: 16px; }
            .unit-card { flex: 1; }
            .result-amount { font-size: 52px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📏 Unit Converter</h1>
            <p class="sub">Length | Weight | Temperature | Speed</p>

            <div class="category-section">
                <label class="category-label">📂 Select Category</label>
                <div class="category-buttons" id="categoryButtons">
                    <button class="cat-btn active" data-cat="length">📐 Length</button>
                    <button class="cat-btn" data-cat="weight">⚖️ Weight</button>
                    <button class="cat-btn" data-cat="temperature">🌡️ Temperature</button>
                    <button class="cat-btn" data-cat="speed">⚡ Speed</button>
                </div>
            </div>

            <div class="amount-section">
                <label class="amount-label">🔢 Enter Value</label>
                <input type="number" id="amount" class="amount-input" value="1" step="any" placeholder="Enter value">
            </div>

            <div class="unit-row">
                <div class="unit-card">
                    <label class="unit-label">📤 From</label>
                    <select id="fromUnit"></select>
                </div>

                <div class="unit-card">
                    <label class="unit-label">📥 To</label>
                    <select id="toUnit"></select>
                </div>
            </div>

            <div class="swap-container">
                <button class="swap-btn" onclick="swapUnits()">🔄 Swap Units</button>
            </div>

            <div class="result-box">
                <div class="result-label">📊 Converted Value</div>
                <div class="result-amount" id="convertedAmount">—</div>
                <div class="result-unit" id="unitText">—</div>
            </div>

            <button class="convert-btn" onclick="convert()">🔄 Convert Now</button>

            <div class="info-text">
                📏 Accurate unit conversion • 100% Free • Instant results
            </div>
        </div>
    </div>

    <script>
        let currentCategory = 'length';

        // Conversion data
        const unitsData = {
            length: {
                meter: { name: "Meter (m)", toBase: 1 },
                kilometer: { name: "Kilometer (km)", toBase: 1000 },
                centimeter: { name: "Centimeter (cm)", toBase: 0.01 },
                millimeter: { name: "Millimeter (mm)", toBase: 0.001 },
                mile: { name: "Mile (mi)", toBase: 1609.344 },
                yard: { name: "Yard (yd)", toBase: 0.9144 },
                foot: { name: "Foot (ft)", toBase: 0.3048 },
                inch: { name: "Inch (in)", toBase: 0.0254 }
            },
            weight: {
                kilogram: { name: "Kilogram (kg)", toBase: 1 },
                gram: { name: "Gram (g)", toBase: 0.001 },
                milligram: { name: "Milligram (mg)", toBase: 0.000001 },
                pound: { name: "Pound (lb)", toBase: 0.453592 },
                ounce: { name: "Ounce (oz)", toBase: 0.0283495 },
                ton: { name: "Ton (t)", toBase: 1000 }
            },
            temperature: {
                celsius: { name: "Celsius (°C)", type: "temp" },
                fahrenheit: { name: "Fahrenheit (°F)", type: "temp" },
                kelvin: { name: "Kelvin (K)", type: "temp" }
            },
            speed: {
                ms: { name: "Meter/sec (m/s)", toBase: 1 },
                kmh: { name: "Kilometer/hour (km/h)", toBase: 0.277778 },
                mph: { name: "Mile/hour (mph)", toBase: 0.44704 },
                knot: { name: "Knot (kn)", toBase: 0.514444 },
                fts: { name: "Foot/sec (ft/s)", toBase: 0.3048 }
            }
        };

        function updateUnitOptions() {
            let fromSelect = document.getElementById('fromUnit');
            let toSelect = document.getElementById('toUnit');
            let data = unitsData[currentCategory];
            
            fromSelect.innerHTML = '';
            toSelect.innerHTML = '';
            
            for (let [key, value] of Object.entries(data)) {
                let option = document.createElement('option');
                option.value = key;
                option.textContent = value.name;
                fromSelect.appendChild(option.cloneNode(true));
                toSelect.appendChild(option);
            }
            
            // Set default selections
            if (currentCategory === 'length') {
                fromSelect.value = 'meter';
                toSelect.value = 'inch';
            } else if (currentCategory === 'weight') {
                fromSelect.value = 'kilogram';
                toSelect.value = 'pound';
            } else if (currentCategory === 'temperature') {
                fromSelect.value = 'celsius';
                toSelect.value = 'fahrenheit';
            } else if (currentCategory === 'speed') {
                fromSelect.value = 'kmh';
                toSelect.value = 'mph';
            }
            
            convert();
        }

        function convertTemperature(value, from, to) {
            let celsius = 0;
            if (from === 'celsius') celsius = value;
            else if (from === 'fahrenheit') celsius = (value - 32) * 5/9;
            else if (from === 'kelvin') celsius = value - 273.15;
            
            if (to === 'celsius') return celsius;
            else if (to === 'fahrenheit') return (celsius * 9/5) + 32;
            else if (to === 'kelvin') return celsius + 273.15;
            return value;
        }

        function convert() {
            let amount = parseFloat(document.getElementById('amount').value);
            let from = document.getElementById('fromUnit').value;
            let to = document.getElementById('toUnit').value;
            
            if (isNaN(amount) || amount === 0) {
                amount = 1;
                document.getElementById('amount').value = 1;
            }
            
            let result = 0;
            
            if (currentCategory === 'temperature') {
                result = convertTemperature(amount, from, to);
            } else {
                let data = unitsData[currentCategory];
                let inBase = amount * data[from].toBase;
                result = inBase / data[to].toBase;
            }
            
            let fromName = unitsData[currentCategory][from].name;
            let toName = unitsData[currentCategory][to].name;
            
            document.getElementById('convertedAmount').innerHTML = result.toFixed(6);
            document.getElementById('unitText').innerHTML = `${fromName} = ${toName}`;
        }

        function swapUnits() {
            let from = document.getElementById('fromUnit');
            let to = document.getElementById('toUnit');
            let temp = from.value;
            from.value = to.value;
            to.value = temp;
            convert();
        }

        // Category buttons
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.getAttribute('data-cat');
                updateUnitOptions();
            });
        });

        // Auto convert
        window.onload = () => {
            updateUnitOptions();
            document.getElementById('amount').addEventListener('input', convert);
            document.getElementById('fromUnit').addEventListener('change', convert);
            document.getElementById('toUnit').addEventListener('change', convert);
        };
    </script>
</body>
</html>
