<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PDF to Image - Convert PDF Pages to Images | Free Online Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            min-height: 100vh;
            padding: 16px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #0f766e 100%);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
            text-align: center;
        }

        body.dark-mode .card {
            background: #1e293b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: #1E3A8A;
            font-size: 24px;
        }

        body.dark-mode h1 {
            color: #0D9488;
        }

        .sub {
            color: #0D9488;
            font-size: 12px;
            font-weight: 500;
        }

        body.dark-mode .sub {
            color: #5eead4;
        }

        .dark-toggle {
            background: #f1f5f9;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        body.dark-mode .dark-toggle {
            background: #334155;
            color: white;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #0D9488;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            background: #f8fafc;
        }

        body.dark-mode .upload-area {
            background: #334155;
            border-color: #5eead4;
        }

        .upload-area:hover {
            background: #f0fdf4;
            border-color: #1E3A8A;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-text {
            color: #1E3A8A;
            font-weight: 500;
        }

        body.dark-mode .upload-text {
            color: #5eead4;
        }

        .upload-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }

        /* PDF Info */
        .pdf-info {
            display: none;
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: left;
        }

        body.dark-mode .pdf-info {
            background: #334155;
        }

        .pdf-info.show {
            display: block;
        }

        .pdf-name {
            font-weight: 700;
            color: #1E3A8A;
            font-size: 14px;
            margin-bottom: 8px;
        }

        body.dark-mode .pdf-name {
            color: #5eead4;
        }

        .pdf-pages {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 12px;
        }

        /* Settings */
        .settings {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: left;
            display: none;
        }

        .settings.show {
            display: block;
        }

        body.dark-mode .settings {
            background: #334155;
        }

        .setting-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .setting-label {
            font-weight: 600;
            color: #1E3A8A;
            font-size: 13px;
            min-width: 100px;
        }

        body.dark-mode .setting-label {
            color: #5eead4;
        }

        select, input {
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            font-size: 13px;
        }

        body.dark-mode select, body.dark-mode input {
            background: #1e293b;
            color: white;
            border-color: #0D9488;
        }

        .range-value {
            font-size: 13px;
            color: #0D9488;
            font-weight: bold;
        }

        /* Page Preview Grid */
        .pages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }

        .page-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }

        body.dark-mode .page-card {
            background: #0f172a;
        }

        .page-card:hover {
            transform: scale(1.02);
        }

        .page-thumb {
            width: 100%;
            height: 160px;
            object-fit: contain;
            background: #f8fafc;
        }

        .page-number {
            padding: 8px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #1E3A8A;
            border-top: 1px solid #e2e8f0;
        }

        body.dark-mode .page-number {
            color: #5eead4;
            border-top-color: #334155;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            background: #0D9488;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn.convert {
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
        }

        .action-btn.download-all {
            background: #22c55e;
        }

        .action-btn.clear {
            background: #dc2626;
        }

        .info-text {
            text-align: center;
            color: #0D9488;
            font-size: 12px;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
        }

        body.dark-mode .info-text {
            background: #0f766e;
            color: #ccfbf1;
        }

        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { max-width: 800px; margin: 0 auto; }
            .pages-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .page-thumb { height: 180px; }
        }
    </style>
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <div><h1>📄 PDF to Image</h1><p class="sub">Convert PDF pages to PNG/JPEG images</p></div>
            <button class="dark-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
        </div>

        <!-- Upload Area -->
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📑</div>
            <div class="upload-text">Click to upload a PDF file</div>
            <div class="upload-hint">PDF only (Max 20MB)</div>
            <input type="file" id="fileInput" accept="application/pdf" style="display:none" onchange="handlePDFUpload(event)">
        </div>

        <!-- PDF Info -->
        <div class="pdf-info" id="pdfInfo">
            <div class="pdf-name" id="pdfName">-</div>
            <div class="pdf-pages" id="pdfPages">Pages: 0</div>
        </div>

        <!-- Settings -->
        <div class="settings" id="settings">
            <div class="setting-row">
                <span class="setting-label">📸 Image Format:</span>
                <select id="imageFormat">
                    <option value="png">PNG (transparent, larger)</option>
                    <option value="jpeg">JPEG (smaller, no transparency)</option>
                </select>
            </div>
            <div class="setting-row">
                <span class="setting-label">📏 Scale/Quality:</span>
                <input type="range" id="scale" min="1" max="3" step="0.5" value="1.5">
                <span class="range-value" id="scaleValue">1.5x</span>
            </div>
            <div class="setting-row">
                <span class="setting-label">📄 Page Range:</span>
                <input type="text" id="pageRange" placeholder="e.g., 1,3,5-8 or all" value="all" style="flex:1;">
            </div>
        </div>

        <!-- Pages Preview -->
        <div id="pagesContainer" style="display:none;">
            <div class="pages-grid" id="pagesGrid"></div>
            <div class="action-buttons">
                <button class="action-btn download-all" id="downloadAllBtn">⬇️ Download All as ZIP</button>
                <button class="action-btn clear" onclick="clearAll()">🗑️ Clear All</button>
            </div>
        </div>

        <div class="info-text">
            💡 Upload PDF → Choose format/scale/page range → Preview pages → Download individual or all as ZIP.
        </div>
    </div>
</div>

<script>
    let pdfDoc = null;
    let pdfFile = null;
    let renderedImages = []; // store {blob, url, pageNum}

    function handlePDFUpload(event) {
        let file = event.target.files[0];
        if (!file) return;
        if (file.type !== 'application/pdf') {
            showToast('Please upload a valid PDF file!', '#dc2626');
            return;
        }
        if (file.size > 20 * 1024 * 1024) {
            showToast('File too large! Max 20MB', '#dc2626');
            return;
        }
        pdfFile = file;
        document.getElementById('pdfName').innerText = file.name;
        document.getElementById('pdfInfo').classList.add('show');
        document.getElementById('settings').classList.add('show');
        document.getElementById('pagesContainer').style.display = 'block';
        
        let reader = new FileReader();
        reader.onload = function(e) {
            let typedarray = new Uint8Array(e.target.result);
            pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                pdfDoc = pdf;
                document.getElementById('pdfPages').innerText = 'Pages: ' + pdf.numPages;
                renderPages();
            }).catch(function(err) {
                console.error(err);
                showToast('Error loading PDF. File may be corrupted.', '#dc2626');
            });
        };
        reader.readAsArrayBuffer(file);
    }

    async function renderPages() {
        if (!pdfDoc) return;
        let format = document.getElementById('imageFormat').value;
        let scale = parseFloat(document.getElementById('scale').value);
        let rangeStr = document.getElementById('pageRange').value.trim().toLowerCase();
        
        let pagesToRender = getPageNumbers(rangeStr, pdfDoc.numPages);
        if (pagesToRender.length === 0) {
            showToast('Invalid page range. Showing all pages.', '#dc2626');
            pagesToRender = Array.from({length: pdfDoc.numPages}, (_, i) => i+1);
        }
        
        document.getElementById('pagesGrid').innerHTML = '<div style="text-align:center; padding:20px;">Loading pages...</div>';
        renderedImages = [];
        
        for (let pageNum of pagesToRender) {
            try {
                let page = await pdfDoc.getPage(pageNum);
                let viewport = page.getViewport({ scale: scale });
                let canvas = document.createElement('canvas');
                let context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                let blob = await new Promise(resolve => canvas.toBlob(resolve, `image/${format}`, 0.9));
                let url = URL.createObjectURL(blob);
                renderedImages.push({ blob, url, pageNum });
            } catch(e) {
                console.error(e);
            }
        }
        displayThumbnails();
    }

    function getPageNumbers(rangeStr, totalPages) {
        if (rangeStr === 'all') return Array.from({length: totalPages}, (_, i) => i+1);
        let pages = new Set();
        let parts = rangeStr.split(',');
        for (let part of parts) {
            part = part.trim();
            if (part.includes('-')) {
                let [start, end] = part.split('-').map(Number);
                if (isNaN(start)) start = 1;
                if (isNaN(end)) end = totalPages;
                for (let i = start; i <= end && i <= totalPages; i++) pages.add(i);
            } else {
                let p = Number(part);
                if (!isNaN(p) && p >=1 && p <= totalPages) pages.add(p);
            }
        }
        return Array.from(pages).sort((a,b)=>a-b);
    }

    function displayThumbnails() {
        let container = document.getElementById('pagesGrid');
        container.innerHTML = '';
        for (let img of renderedImages) {
            let card = document.createElement('div');
            card.className = 'page-card';
            card.onclick = () => downloadSingle(img.pageNum, img.blob);
            let thumb = document.createElement('img');
            thumb.src = img.url;
            thumb.className = 'page-thumb';
            let pageDiv = document.createElement('div');
            pageDiv.className = 'page-number';
            pageDiv.innerText = `Page ${img.pageNum}`;
            card.appendChild(thumb);
            card.appendChild(pageDiv);
            container.appendChild(card);
        }
        if (renderedImages.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px;">No pages rendered. Check page range.</div>';
        }
    }

    function downloadSingle(pageNum, blob) {
        let link = document.createElement('a');
        let format = document.getElementById('imageFormat').value;
        let fileName = `page_${pageNum}.${format}`;
        link.download = fileName;
        link.href = URL.createObjectURL(blob);
        link.click();
        URL.revokeObjectURL(link.href);
        showToast(`Downloaded page ${pageNum}`, '#22c55e');
    }

    function downloadAllAsZip() {
        if (renderedImages.length === 0) {
            showToast('No images to download. Render pages first.', '#dc2626');
            return;
        }
        // Use JSZip library (include dynamically)
        let script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        script.onload = function() {
            let zip = new JSZip();
            let format = document.getElementById('imageFormat').value;
            for (let img of renderedImages) {
                let fileName = `page_${img.pageNum}.${format}`;
                zip.file(fileName, img.blob);
            }
            zip.generateAsync({type: 'blob'}).then(function(content) {
                let link = document.createElement('a');
                let pdfName = pdfFile.name.replace('.pdf', '');
                link.download = `${pdfName}_images.zip`;
                link.href = URL.createObjectURL(content);
                link.click();
                URL.revokeObjectURL(link.href);
                showToast('✅ ZIP downloaded!', '#22c55e');
            });
        };
        document.head.appendChild(script);
        showToast('Preparing ZIP...', '#0D9488');
    }

    function clearAll() {
        pdfDoc = null;
        pdfFile = null;
        renderedImages = [];
        document.getElementById('fileInput').value = '';
        document.getElementById('pdfInfo').classList.remove('show');
        document.getElementById('settings').classList.remove('show');
        document.getElementById('pagesContainer').style.display = 'none';
        document.getElementById('pagesGrid').innerHTML = '';
        showToast('Cleared', '#dc2626');
    }

    // Event listeners
    document.getElementById('scale').addEventListener('input', function(e) {
        document.getElementById('scaleValue').innerText = e.target.value + 'x';
        if (pdfDoc) renderPages();
    });
    document.getElementById('imageFormat').addEventListener('change', function() {
        if (pdfDoc) renderPages();
    });
    document.getElementById('pageRange').addEventListener('change', function() {
        if (pdfDoc) renderPages();
    });
    document.getElementById('downloadAllBtn').addEventListener('click', downloadAllAsZip);

    function showToast(msg, bgColor) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = bgColor;
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '50px';
        toast.style.fontSize = '14px';
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '1000';
        toast.style.boxShadow = '0 5px 15px rgba(0,0,0,0.2)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        let btn = document.querySelector('.dark-toggle');
        if (document.body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ Light Mode';
            localStorage.setItem('darkMode', 'enabled');
        } else {
            btn.innerHTML = '🌙 Dark Mode';
            localStorage.setItem('darkMode', 'disabled');
        }
    }

    function loadDarkMode() {
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
            document.querySelector('.dark-toggle').innerHTML = '☀️ Light Mode';
        }
    }

    window.onload = loadDarkMode;
</script>
</body>
</html>
