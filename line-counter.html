<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Line Counter - Free Online Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 {
            color: #1E3A8A;
            font-size: 28px;
            text-align: center;
            margin-bottom: 6px;
        }

        .sub {
            text-align: center;
            color: #0D9488;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
        }

        /* Stats Cards */
        .stats-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            flex: 1;
            min-width: 100px;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            color: white;
            padding: 16px 12px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* Text Area */
        .textarea-section {
            margin-bottom: 20px;
        }

        .textarea-label {
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 10px;
            font-size: 15px;
            display: block;
        }

        textarea {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 250px;
            background: #f8fafc;
        }

        textarea:focus {
            outline: none;
            border-color: #0D9488;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .action-btn {
            flex: 1;
            background: #f1f5f9;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            color: #1E3A8A;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn.clear {
            background: #fee2e2;
            color: #dc2626;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        /* Extra Info */
        .extra-info {
            background: #f0fdf4;
            padding: 16px;
            border-radius: 20px;
            margin-top: 20px;
        }

        .info-title {
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .info-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .info-item {
            flex: 1;
            min-width: 80px;
            text-align: center;
            padding: 8px;
            background: white;
            border-radius: 12px;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #0D9488;
        }

        .info-label {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
        }

        .info-text {
            text-align: center;
            color: #0D9488;
            font-size: 12px;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
        }

        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { max-width: 700px; margin: 0 auto; }
            .stat-number { font-size: 36px; }
            textarea { min-height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📝 Line Counter</h1>
            <p class="sub">Count lines, characters, words & more</p>

            <!-- Statistics Cards -->
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-number" id="lineCount">0</div>
                    <div class="stat-label">📊 Lines</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="charCount">0</div>
                    <div class="stat-label">🔤 Characters</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="wordCount">0</div>
                    <div class="stat-label">📖 Words</div>
                </div>
            </div>

            <!-- Text Input -->
            <div class="textarea-section">
                <label class="textarea-label">✏️ Enter Your Text Below</label>
                <textarea id="textInput" placeholder="Paste or type your text here...
Example:
Line 1
Line 2
Line 3"></textarea>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="action-btn" onclick="clearText()">🗑️ Clear All</button>
                <button class="action-btn" onclick="copyText()">📋 Copy Text</button>
                <button class="action-btn" onclick="sampleText()">📝 Load Sample</button>
            </div>

            <!-- Extra Information -->
            <div class="extra-info">
                <div class="info-title">📊 Detailed Statistics</div>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-value" id="charNoSpace">0</div>
                        <div class="info-label">Characters (no space)</div>
                    </div>
                    <div class="info-item">
                        <div class="info-value" id="sentenceCount">0</div>
                        <div class="info-label">Sentences</div>
                    </div>
                    <div class="info-item">
                        <div class="info-value" id="paraCount">0</div>
                        <div class="info-label">Paragraphs</div>
                    </div>
                    <div class="info-item">
                        <div class="info-value" id="spaceCount">0</div>
                        <div class="info-label">Spaces</div>
                    </div>
                </div>
            </div>

            <div class="info-text">
                📝 Empty lines are also counted • Real-time counting • 100% Free
            </div>
        </div>
    </div>

    <script>
        function countAll() {
            let text = document.getElementById('textInput').value;
            
            // Line Count (including empty lines)
            let lines = text.split(/\r?\n/);
            let lineCount = lines.length;
            
            // If text is empty, show 0 lines
            if (text === "") {
                lineCount = 0;
            }
            
            // Character Count (total)
            let charCount = text.length;
            
            // Character Count without spaces
            let charNoSpace = text.replace(/\s/g, '').length;
            
            // Word Count
            let wordCount = 0;
            if (text.trim() !== "") {
                wordCount = text.trim().split(/\s+/).length;
            }
            
            // Space Count
            let spaceCount = (text.match(/\s/g) || []).length;
            
            // Sentence Count (., !, ?)
            let sentenceCount = 0;
            if (text.trim() !== "") {
                sentenceCount = (text.match(/[.!?]+/g) || []).length;
                if (sentenceCount === 0 && text.trim().length > 0) {
                    sentenceCount = 1;
                }
            }
            
            // Paragraph Count (empty lines se separate)
            let paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
            let paraCount = paragraphs.length;
            
            // Update DOM
            document.getElementById('lineCount').innerHTML = lineCount;
            document.getElementById('charCount').innerHTML = charCount;
            document.getElementById('wordCount').innerHTML = wordCount;
            document.getElementById('charNoSpace').innerHTML = charNoSpace;
            document.getElementById('sentenceCount').innerHTML = sentenceCount;
            document.getElementById('paraCount').innerHTML = paraCount;
            document.getElementById('spaceCount').innerHTML = spaceCount;
        }
        
        function clearText() {
            document.getElementById('textInput').value = '';
            countAll();
        }
        
        function copyText() {
            let text = document.getElementById('textInput').value;
            if (text === "") {
                alert("⚠️ Nothing to copy! Please enter some text first.");
                return;
            }
            navigator.clipboard.writeText(text);
            alert("✅ Text copied to clipboard!");
        }
        
        function sampleText() {
            document.getElementById('textInput').value = `Line Counter Tool is amazing!
It counts every line in your text.

This is a third line.
And here's a fourth line with more words.

This is a new paragraph after an empty line.
Line counter also counts empty lines separately.`;
            countAll();
        }
        
        // Real-time counting
        window.onload = () => {
            let textarea = document.getElementById('textInput');
            textarea.addEventListener('input', countAll);
            countAll();
        };
    </script>
</body>
</html>
