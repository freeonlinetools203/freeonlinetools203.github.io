<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <style>body{font-family:sans-serif;text-align:center;padding:50px;}</style>
</head>
<body>
    <p>Redirecting you to the original link...</p>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const mapping = {
            // Example static mapping: "abc123": "https://example.com"
        };
        // Load from localStorage
        const stored = localStorage.getItem(`short_${code}`);
        if (stored) {
            window.location.href = stored;
        } else if (mapping[code]) {
            window.location.href = mapping[code];
        } else {
            document.body.innerHTML = '<h1>404</h1><p>Short link not found.</p><a href="/">Go Home</a>';
        }
    </script>
</body>
</html>
