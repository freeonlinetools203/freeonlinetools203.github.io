<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Decision Roulette - Multiple Choice Decision Maker | Free Online Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            min-height: 100vh;
            padding: 16px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #0f766e 100%);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
        }

        body.dark-mode .card {
            background: #1e293b;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: #1E3A8A;
            font-size: 24px;
        }

        body.dark-mode h1 {
            color: #0D9488;
        }

        .sub {
            color: #0D9488;
            font-size: 12px;
            font-weight: 500;
        }

        body.dark-mode .sub {
            color: #5eead4;
        }

        .dark-toggle {
            background: #f1f5f9;
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        body.dark-mode .dark-toggle {
            background: #334155;
            color: white;
        }

        /* Options Section */
        .options-section {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
        }

        body.dark-mode .options-section {
            background: #334155;
        }

        .options-label {
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 12px;
            font-size: 14px;
            display: block;
        }

        body.dark-mode .options-label {
            color: #5eead4;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .option-item {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .option-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            background: white;
        }

        body.dark-mode .option-input {
            background: #1e293b;
            color: white;
            border-color: #0D9488;
        }

        .remove-option {
            background: #dc2626;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .add-option-btn {
            background: #0D9488;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        /* Wheel Container */
        .wheel-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .wheel {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            transition: transform 0.1s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #dc2626;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
            z-index: 10;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }

        .spin-btn {
            width: 100%;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            color: white;
            border: none;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            margin: 20px 0;
            transition: transform 0.2s;
        }

        .spin-btn:active {
            transform: scale(0.98);
        }

        /* Result Card */
        .result-card {
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        .result-card.winner-animation {
            animation: winnerPop 0.6s ease-out;
        }

        @keyframes winnerPop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .decision-text {
            font-size: 28px;
            font-weight: bold;
            color: white;
            word-break: break-word;
            margin-bottom: 10px;
        }

        .decision-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }

        /* Preset Options */
        .preset-section {
            margin-bottom: 20px;
        }

        .preset-title {
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 10px;
            font-size: 13px;
        }

        body.dark-mode .preset-title {
            color: #5eead4;
        }

        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .preset-btn {
            background: #f1f5f9;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        body.dark-mode .preset-btn {
            background: #334155;
            color: white;
        }

        .preset-btn:active {
            transform: scale(0.95);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            background: #0D9488;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .info-text {
            text-align: center;
            color: #0D9488;
            font-size: 12px;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
        }

        body.dark-mode .info-text {
            background: #0f766e;
            color: #ccfbf1;
        }

        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { max-width: 600px; margin: 0 auto; }
            .wheel { width: 320px; height: 320px; }
            .decision-text { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div>
                    <h1>🎯 Decision Roulette</h1>
                    <p class="sub">Spin the wheel to make a decision</p>
                </div>
                <button class="dark-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
            </div>

            <!-- Options Section -->
            <div class="options-section">
                <label class="options-label">📝 Enter Your Options</label>
                <div class="options-list" id="optionsList">
                    <div class="option-item">
                        <input type="text" class="option-input" placeholder="Option 1" value="Option 1">
                        <button class="remove-option" onclick="removeOption(this)">✕</button>
                    </div>
                    <div class="option-item">
                        <input type="text" class="option-input" placeholder="Option 2" value="Option 2">
                        <button class="remove-option" onclick="removeOption(this)">✕</button>
                    </div>
                    <div class="option-item">
                        <input type="text" class="option-input" placeholder="Option 3" value="Option 3">
                        <button class="remove-option" onclick="removeOption(this)">✕</button>
                    </div>
                </div>
                <button class="add-option-btn" onclick="addOption()">+ Add Option</button>
            </div>

            <!-- Preset Options -->
            <div class="preset-section">
                <div class="preset-title">⚡ Quick Presets</div>
                <div class="preset-buttons">
                    <button class="preset-btn" onclick="loadPreset('food')">🍕 What to Eat</button>
                    <button class="preset-btn" onclick="loadPreset('movie')">🎬 What to Watch</button>
                    <button class="preset-btn" onclick="loadPreset('activity')">🏃 Activity</button>
                    <button class="preset-btn" onclick="loadPreset('travel')">✈️ Travel</button>
                    <button class="preset-btn" onclick="loadPreset('gift')">🎁 Gift Idea</button>
                </div>
            </div>

            <!-- Wheel -->
            <div class="wheel-wrapper">
                <div class="pointer"></div>
                <canvas id="decisionWheel" class="wheel" width="500" height="500"></canvas>
            </div>

            <button class="spin-btn" onclick="spinWheel()">🎡 SPIN THE WHEEL</button>

            <!-- Result -->
            <div class="result-card" id="resultCard">
                <div class="decision-text" id="decisionText">—</div>
                <div class="decision-sub" id="decisionSub">Add options and spin the wheel</div>
            </div>

            <div class="action-buttons">
                <button class="action-btn" onclick="resetWheel()">🔄 Reset Wheel</button>
                <button class="action-btn" onclick="copyDecision()">📋 Copy Decision</button>
            </div>

            <div class="info-text">
                💡 Add your options • Spin the wheel • Let fate decide!
            </div>
        </div>
    </div>

    <script>
        let currentAngle = 0;
        let spinning = false;
        let spinStartTime = 0;
        let spinDuration = 2000;
        let spinEndAngle = 0;
        let options = ['Option 1', 'Option 2', 'Option 3'];
        let colors = [];

        let canvas = document.getElementById('decisionWheel');
        let ctx = canvas.getContext('2d');

        // Generate random colors for options
        function generateColors(count) {
            let colorList = [];
            for (let i = 0; i < count; i++) {
                let hue = (i * 360 / count) % 360;
                colorList.push(`hsl(${hue}, 70%, 55%)`);
            }
            return colorList;
        }

        function updateOptionsFromInputs() {
            let inputs = document.querySelectorAll('.option-input');
            options = [];
            inputs.forEach(input => {
                let val = input.value.trim();
                if (val !== '') {
                    options.push(val);
                } else {
                    options.push('Option');
                }
            });
            if (options.length === 0) options = ['Option'];
            colors = generateColors(options.length);
            resizeCanvas();
            drawWheel(currentAngle);
        }

        function addOption() {
            let list = document.getElementById('optionsList');
            let div = document.createElement('div');
            div.className = 'option-item';
            div.innerHTML = `
                <input type="text" class="option-input" placeholder="New Option" value="New Option">
                <button class="remove-option" onclick="removeOption(this)">✕</button>
            `;
            list.appendChild(div);
            updateOptionsFromInputs();
        }

        function removeOption(btn) {
            let list = document.getElementById('optionsList');
            if (list.children.length <= 2) {
                showFeedback('At least 2 options required!', '#dc2626');
                return;
            }
            btn.parentElement.remove();
            updateOptionsFromInputs();
        }

        function resizeCanvas() {
            let size = window.innerWidth < 600 ? 260 : 320;
            canvas.width = size;
            canvas.height = size;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            drawWheel(currentAngle);
        }

        function drawWheel(angle) {
            if (options.length === 0) return;
            
            let size = canvas.width;
            let centerX = size / 2;
            let centerY = size / 2;
            let radius = size / 2;
            let angleStep = (Math.PI * 2) / options.length;

            ctx.clearRect(0, 0, size, size);

            for (let i = 0; i < options.length; i++) {
                let startAngle = i * angleStep + angle;
                let endAngle = (i + 1) * angleStep + angle;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                
                ctx.fillStyle = colors[i];
                ctx.fill();
                
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.lineTo(centerX, centerY);
                ctx.stroke();
                
                // Draw text
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + angleStep / 2);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let fontSize = Math.min(size * 0.035, 14);
                ctx.font = `500 ${fontSize}px "Segoe UI"`;
                ctx.fillStyle = 'white';
                ctx.shadowBlur = 0;
                let text = options[i];
                if (text.length > 12) text = text.substring(0, 10) + '..';
                ctx.fillText(text, radius * 0.65, 0);
                ctx.restore();
            }
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.1, 0, Math.PI * 2);
            ctx.fillStyle = '#1E3A8A';
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function getDecisionAtPointer() {
            let pointerAngle = -Math.PI / 2;
            let actualAngle = pointerAngle - currentAngle;
            
            while (actualAngle < 0) actualAngle += Math.PI * 2;
            while (actualAngle >= Math.PI * 2) actualAngle -= Math.PI * 2;
            
            let angleStep = (Math.PI * 2) / options.length;
            let index = Math.floor(actualAngle / angleStep);
            index = Math.min(index, options.length - 1);
            
            return options[index];
        }

        function createConfetti() {
            for (let i = 0; i < 80; i++) {
                let confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = Math.random() * 8 + 4 + 'px';
                confetti.style.height = Math.random() * 8 + 4 + 'px';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.borderRadius = '2px';
                confetti.style.zIndex = '1000';
                confetti.style.pointerEvents = 'none';
                confetti.style.animation = `confettiFall ${Math.random() * 1 + 1.5}s ease-out forwards`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2000);
            }
        }

        // Add confetti animation style
        const style = document.createElement('style');
        style.textContent = `
            @keyframes confettiFall {
                0% { transform: translateY(0) rotate(0deg); opacity: 1; }
                100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        function spinWheel() {
            if (spinning) return;
            if (options.length < 2) {
                showFeedback('Add at least 2 options!', '#dc2626');
                return;
            }
            
            spinning = true;
            spinStartTime = performance.now();
            
            let fullRotations = 5 + Math.random() * 5;
            let finalAngleOffset = Math.random() * Math.PI * 2;
            spinEndAngle = currentAngle + (fullRotations * Math.PI * 2) + finalAngleOffset;
            
            if (navigator.vibrate) navigator.vibrate(50);
            
            animateSpin(spinStartTime);
        }

        function animateSpin(now) {
            let elapsed = performance.now() - now;
            let t = Math.min(1, elapsed / spinDuration);
            let easeOut = 1 - Math.pow(1 - t, 3);
            
            let newAngle = currentAngle + (spinEndAngle - currentAngle) * easeOut;
            currentAngle = newAngle % (Math.PI * 2);
            drawWheel(currentAngle);
            
            if (t < 1) {
                requestAnimationFrame(() => animateSpin(now));
            } else {
                spinning = false;
                let decision = getDecisionAtPointer();
                
                let resultCard = document.getElementById('resultCard');
                let decisionText = document.getElementById('decisionText');
                let decisionSub = document.getElementById('decisionSub');
                
                decisionText.innerHTML = decision;
                decisionSub.innerHTML = '🎉 The wheel has decided! 🎉';
                
                resultCard.classList.add('winner-animation');
                createConfetti();
                
                if (navigator.vibrate) navigator.vibrate(100);
                
                setTimeout(() => {
                    resultCard.classList.remove('winner-animation');
                }, 600);
                
                showFeedback(`Decision: ${decision}`, '#22c55e');
            }
        }

        function resetWheel() {
            if (spinning) return;
            currentAngle = 0;
            drawWheel(currentAngle);
            document.getElementById('decisionText').innerHTML = '—';
            document.getElementById('decisionSub').innerHTML = 'Add options and spin the wheel';
            showFeedback('Wheel reset!', '#0D9488');
        }

        function copyDecision() {
            let decision = document.getElementById('decisionText').innerHTML;
            if (decision === '—') {
                showFeedback('Please spin the wheel first!', '#dc2626');
                return;
            }
            navigator.clipboard.writeText(decision);
            showFeedback('✅ Copied: ' + decision, '#0D9488');
        }

        function loadPreset(type) {
            let list = document.getElementById('optionsList');
            list.innerHTML = '';
            
            let presetOptions = [];
            if (type === 'food') {
                presetOptions = ['🍕 Pizza', '🍔 Burger', '🥗 Salad', '🍣 Sushi', '🍜 Noodles', '🥘 Curry'];
            } else if (type === 'movie') {
                presetOptions = ['🎬 Action', '😂 Comedy', '😱 Horror', '💕 Romance', '🔍 Thriller', '📺 Documentary'];
            } else if (type === 'activity') {
                presetOptions = ['🏃 Running', '🏋️ Gym', '🧘 Yoga', '🚴 Cycling', '🏊 Swimming', '🚶 Walking'];
            } else if (type === 'travel') {
                presetOptions = ['🏖️ Beach', '🏔️ Mountains', '🌆 City', '🌲 Forest', '🏜️ Desert', '🏝️ Island'];
            } else if (type === 'gift') {
                presetOptions = ['📱 Phone', '💻 Laptop', '⌚ Watch', '👟 Shoes', '📚 Book', '🎧 Headphones'];
            }
            
            presetOptions.forEach(opt => {
                let div = document.createElement('div');
                div.className = 'option-item';
                div.innerHTML = `
                    <input type="text" class="option-input" value="${opt}">
                    <button class="remove-option" onclick="removeOption(this)">✕</button>
                `;
                list.appendChild(div);
            });
            
            updateOptionsFromInputs();
            showFeedback(`${presetOptions.length} options loaded!`, '#0D9488');
        }

        function showFeedback(msg, bgColor) {
            let feedback = document.createElement('div');
            feedback.innerText = msg;
            feedback.style.position = 'fixed';
            feedback.style.bottom = '30px';
            feedback.style.left = '50%';
            feedback.style.transform = 'translateX(-50%)';
            feedback.style.backgroundColor = bgColor;
            feedback.style.color = 'white';
            feedback.style.padding = '12px 24px';
            feedback.style.borderRadius = '50px';
            feedback.style.fontSize = '14px';
            feedback.style.zIndex = '1000';
            feedback.style.boxShadow = '0 5px 15px rgba(0,0,0,0.2)';
            document.body.appendChild(feedback);
            setTimeout(() => { feedback.remove(); }, 2000);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            let btn = document.querySelector('.dark-toggle');
            if (document.body.classList.contains('dark-mode')) {
                btn.innerHTML = '☀️ Light Mode';
                localStorage.setItem('darkMode', 'enabled');
            } else {
                btn.innerHTML = '🌙 Dark Mode';
                localStorage.setItem('darkMode', 'disabled');
            }
        }

        function loadDarkMode() {
            let darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'enabled') {
                document.body.classList.add('dark-mode');
                document.querySelector('.dark-toggle').innerHTML = '☀️ Light Mode';
            }
        }

        // Listen for input changes
        document.addEventListener('input', function(e) {
            if (e.target.classList && e.target.classList.contains('option-input')) {
                updateOptionsFromInputs();
            }
        });

        window.addEventListener('resize', () => { resizeCanvas(); });

        window.onload = () => {
            loadDarkMode();
            updateOptionsFromInputs();
            drawWheel(currentAngle);
        };
    </script>
</body>
</html>
