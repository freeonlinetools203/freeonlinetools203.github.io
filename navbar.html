<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

.megamenu-container {
    width: 100%;
    background: linear-gradient(to right, #881e8a, #2563eb);
    position: relative;
    z-index: 1000;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.megamenu-wrapper {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    min-height: 60px;
}

.megamenu-logo a {
    display: block;
    color: white;
    font-size: 1.2rem;
    font-weight: bold;
    text-decoration: none;
    padding: 12px 0;
}

.megamenu-nav {
    display: flex;
    gap: 5px;
    list-style: none;
    margin: 0;
    padding: 0;
}

.megamenu-nav > li {
    position: static;
}

.megamenu-nav > li > a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 12px 15px;
    font-size: 0.95rem;
    font-weight: 500;
    transition: all 0.3s ease;
    border-radius: 8px;
}

.megamenu-nav > li > a:hover {
    background: rgba(255,255,255,0.15);
}

.has-dropdown > a::after {
    content: " ▼";
    font-size: 10px;
    margin-left: 5px;
}

.mega-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    width: 100%;
    background: white;
    border-radius: 0 0 12px 12px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    opacity: 0;
    visibility: hidden;
    transition: all 0.25s ease;
    z-index: 1001;
}

.megamenu-nav > li:hover .mega-dropdown {
    opacity: 1;
    visibility: visible;
}

.dropdown-scroll {
    max-height: 500px;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px;
}

.dropdown-scroll::-webkit-scrollbar {
    width: 8px;
}

.dropdown-scroll::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
}

.dropdown-scroll::-webkit-scrollbar-thumb {
    background: #881e8a;
    border-radius: 10px;
}

.dropdown-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
}

.dropdown-column h4 {
    color: #881e8a;
    font-size: 0.9rem;
    margin-bottom: 10px;
    padding-bottom: 5px;
    border-bottom: 2px solid #2563eb;
    position: sticky;
    top: 0;
    background: white;
    z-index: 1;
}

.dropdown-column a {
    display: block;
    color: #333;
    text-decoration: none;
    padding: 6px 0;
    font-size: 0.8rem;
    transition: all 0.2s;
    border-bottom: 1px solid #f0f0f0;
}

.dropdown-column a:hover {
    color: #2563eb;
    padding-left: 8px;
}

.megamenu-search {
    display: flex;
    align-items: center;
    position: relative;
}

.megamenu-search input {
    padding: 8px 15px;
    border: none;
    border-radius: 25px;
    width: 220px;
    outline: none;
    font-size: 0.85rem;
}

.search-results-container {
    position: absolute;
    top: 45px;
    right: 0;
    width: 320px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-height: 400px;
    overflow-y: auto;
    display: none;
    z-index: 1002;
}

.search-results-container.active {
    display: block;
}

.search-result-item {
    padding: 10px 15px;
    border-bottom: 1px solid #eee;
}

.search-result-item a {
    text-decoration: none;
    color: #333;
    display: block;
}

.search-result-item a:hover {
    color: #2563eb;
}

.mobile-toggle {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    padding: 10px;
}

.mobile-menu {
    display: none;
    background: white;
    width: 100%;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
}

.mobile-menu.open {
    display: block;
    max-height: 80vh;
    overflow-y: auto;
}

.mobile-nav {
    list-style: none;
    margin: 0;
    padding: 0;
}

.mobile-nav > li {
    border-bottom: 1px solid #eee;
}

.mobile-nav > li > a {
    display: block;
    padding: 14px 16px;
    color: #333;
    text-decoration: none;
    font-weight: 500;
}

.mobile-dropdown-toggle {
    display: flex !important;
    justify-content: space-between;
    align-items: center;
}

.mobile-dropdown-toggle::after {
    content: "▼";
    font-size: 10px;
    color: #888;
}

.mobile-dropdown-toggle.open::after {
    content: "▲";
}

.mobile-dropdown-content {
    padding-left: 20px;
    display: none;
    background: #f9f9f9;
    max-height: 300px;
    overflow-y: auto;
}

.mobile-dropdown-content.open {
    display: block;
}

.mobile-dropdown-content h4 {
    padding: 10px 0 5px 12px;
    color: #881e8a;
    font-size: 0.85rem;
    font-weight: bold;
    position: sticky;
    top: 0;
    background: #f9f9f9;
}

.mobile-dropdown-content a {
    display: block;
    padding: 8px 12px 8px 20px;
    color: #555;
    text-decoration: none;
    font-size: 0.85rem;
    border-bottom: 1px solid #eee;
}

.mobile-search {
    padding: 12px;
    background: #f5f5f5;
    border-bottom: 1px solid #ddd;
    position: sticky;
    top: 0;
    z-index: 10;
}

.mobile-search input {
    width: 100%;
    padding: 10px 15px;
    border: 1px solid #ddd;
    border-radius: 25px;
    font-size: 0.9rem;
    outline: none;
}

.mobile-search-results {
    background: white;
    border-radius: 10px;
    margin-top: 8px;
    max-height: 250px;
    overflow-y: auto;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 2000;
    overflow-y: auto;
}

.modal-content {
    background: white;
    max-width: 1200px;
    margin: 50px auto;
    padding: 20px;
    border-radius: 20px;
    position: relative;
}

.modal-close {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    color: #888;
}

.modal-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-top: 30px;
    max-height: 70vh;
    overflow-y: auto;
}

.modal-category {
    background: #f9f9f9;
    padding: 12px;
    border-radius: 10px;
}

.modal-category h3 {
    color: #881e8a;
    font-size: 0.9rem;
    margin-bottom: 10px;
    padding-bottom: 5px;
    border-bottom: 2px solid #2563eb;
}

.modal-category a {
    display: block;
    color: #555;
    text-decoration: none;
    padding: 5px 0;
    font-size: 0.8rem;
}

@media (max-width: 1100px) {
    .dropdown-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 900px) {
    .dropdown-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 768px) {
    .megamenu-nav { display: none; }
    .megamenu-search { display: none; }
    .mobile-toggle { display: block; }
    .mega-dropdown { display: none; }
    .modal-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
    .modal-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="megamenu-container">
    <div class="megamenu-wrapper">
        <div class="megamenu-logo">
            <a href="index.html">✨ Free Online Tools</a>
        </div>
        
        <ul class="megamenu-nav">
            <li><a href="index.html">🏠 Home</a></li>
            <li><a href="about.html">ℹ️ About</a></li>
            <li><a href="contact.html">📧 Contact</a></li>
            <li><a href="privacy-policy.html">🔒 Privacy</a></li>
            <li><a href="terms-conditions.html">📜 Terms</a></li>
            <li><a href="disclaimer.html">⚠️ Disclaimer</a></li>
        </ul>
        
        <div class="megamenu-search">
            <input type="text" id="searchInput" placeholder="🔍 Search 500+ tools...">
            <div id="searchResults" class="search-results-container"></div>
        </div>
        
        <button class="mobile-toggle" id="mobileToggle">☰</button>
    </div>
    
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-search">
            <input type="text" id="mobileSearchInput" placeholder="🔍 Search tools...">
            <div id="mobileSearchResults" class="mobile-search-results"></div>
        </div>
        <ul class="mobile-nav">
            <li><a href="index.html">🏠 Home</a></li>
            <li><a href="about.html">ℹ️ About</a></li>
            <li><a href="contact.html">📧 Contact</a></li>
            <li><a href="privacy-policy.html">🔒 Privacy</a></li>
            <li><a href="terms-conditions.html">📜 Terms</a></li>
            <li><a href="disclaimer.html">⚠️ Disclaimer</a></li>
        </ul>
    </div>
</div>

<div id="viewAllModal" class="modal">
    <div class="modal-content">
        <span class="modal-close">&times;</span>
        <h2 id="modalTitle">All Tools</h2>
        <div id="modalContent" class="modal-grid"></div>
    </div>
</div>

<script>
// Complete Tools Database for Search
const allToolsList = [
    "keyword-density-checker.html|Keyword Density Checker|SEO",
    "meta-tags-generator.html|Meta Tags Generator|SEO",
    "meta-tag-analyzer.html|Meta Tag Analyzer|SEO",
    "instagram-hashtag-generator.html|Instagram Hashtag Generator|Social Media",
    "linkedin-hashtag-generator.html|LinkedIn Hashtag Generator|Social Media",
    "facebook-hashtag-generator.html|Facebook Hashtag Generator|Social Media",
    "pinterest-hashtag-generator.html|Pinterest Hashtag Generator|Social Media",
    "ai-hashtag-generator.html|AI Hashtag Generator|Social Media",
    "seo-hashtags-generator.html|SEO Hashtags Generator|SEO",
    "dog-pregnancy-calculator.html|Dog Pregnancy Calculator|Animals",
    "cat-pregnancy-calculator.html|Cat Pregnancy Calculator|Animals",
    "cow-pregnancy-calculator.html|Cow Pregnancy Calculator|Animals",
    "rabbit-pregnancy-calculator.html|Rabbit Pregnancy Calculator|Animals",
    "goat-pregnancy-calculator.html|Goat Pregnancy Calculator|Animals",
    "horse-pregnancy-calculator.html|Horse Pregnancy Calculator|Animals",
    "sheep-pregnancy-calculator.html|Sheep Pregnancy Calculator|Animals",
    "pig-pregnancy-calculator.html|Pig Pregnancy Calculator|Animals",
    "md5-generator.html|MD5 Hash Generator|Developer",
    "sha256-generator.html|SHA-256 Hash Generator|Developer",
    "sha1-generator.html|SHA-1 Hash Generator|Developer",
    "base64-encoder-decoder.html|Base64 Encoder/Decoder|Developer",
    "url-encoder-decoder.html|URL Encoder/Decoder|Developer",
    "html-encoder-decoder.html|HTML Encoder/Decoder|Developer",
    "color-palette-generator.html|Color Palette Generator|Color",
    "color-shades-generator.html|Color Shades Generator|Color",
    "color-gradient-maker.html|Color Gradient Maker|Color",
    "color-contrast-checker.html|Color Contrast Checker|Color",
    "color-name-finder.html|Color Name Finder|Color",
    "random-color-picker.html|Random Color Picker|Color",
    "unit-converter.html|Unit Converter|Calculator",
    "age-calculator.html|Age Calculator|Calculator",
    "age-difference-calculator.html|Age Difference Calculator|Calculator",
    "discount-calculator.html|Discount Calculator|Calculator",
    "profit-loss-calculator.html|Profit & Loss Calculator|Calculator",
    "gpa-calculator.html|GPA/CGPA Calculator|Calculator",
    "gst-calculator.html|GST Calculator|Calculator",
    "percentage-calculator.html|Percentage Calculator|Calculator",
    "date-calculator.html|Date Calculator|Calculator",
    "qr-code-generator.html|QR Code Generator|Calculator",
    "youtube-thumbnail-downloader.html|YouTube Thumbnail Downloader|Calculator",
    "currency-converter.html|Currency Converter|Calculator",
    "bmi-calculator.html|BMI Calculator|Health",
    "bmr-calculator.html|BMR Calculator|Health",
    "calorie-calculator.html|Calorie Calculator|Health",
    "tdee-calculator.html|TDEE Calculator|Health",
    "emi-calculator.html|EMI Calculator|Finance",
    "loan-calculator.html|Loan Calculator|Finance",
    "zakat-calculator.html|Zakat Calculator|Finance",
    "word-counter.html|Word Counter|Writing",
    "line-counter.html|Line Counter|Writing",
    "text-case-converter.html|Text Case Converter|Writing",
    "password-generator.html|Password Generator|Writing",
    "password-checker.html|Password Strength Checker|Writing",
    "pdf-merger.html|PDF Merger|PDF",
    "pdf-splitter.html|PDF Splitter|PDF",
    "pdf-to-image.html|PDF to Image|PDF",
    "pdf-to-word.html|PDF to Word|PDF",
    "pdf-to-excel.html|PDF to Excel|PDF",
    "spin-the-wheel.html|Spin The Wheel|Fun",
    "random-number-generator.html|Random Number Generator|Fun"
];

const allTools = allToolsList.map(tool => {
    let [url, name, category] = tool.split('|');
    return { name, url, category };
});

// Wait for DOM to be fully loaded
document.addEventListener('DOMContentLoaded', function() {
    // Desktop Search
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    
    if (searchInput && searchResults) {
        searchInput.addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            
            if (query.length < 2) {
                searchResults.classList.remove('active');
                return;
            }
            
            const matches = allTools.filter(tool => 
                tool.name.toLowerCase().includes(query)
            ).slice(0, 10);
            
            if (matches.length > 0) {
                searchResults.innerHTML = matches.map(tool => `
                    <div class="search-result-item">
                        <a href="${tool.url}">
                            <strong>${tool.name}</strong><br>
                            <small style="color:#888">${tool.category}</small>
                        </a>
                    </div>
                `).join('');
                searchResults.classList.add('active');
            } else {
                searchResults.innerHTML = '<div class="search-result-item">No tools found</div>';
                searchResults.classList.add('active');
            }
        });
        
        // Close search results when clicking outside
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.remove('active');
            }
        });
    }
    
    // Mobile Search
    const mobileSearchInput = document.getElementById('mobileSearchInput');
    const mobileSearchResults = document.getElementById('mobileSearchResults');
    
    if (mobileSearchInput && mobileSearchResults) {
        mobileSearchInput.addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            
            if (query.length < 2) {
                mobileSearchResults.innerHTML = '';
                return;
            }
            
            const matches = allTools.filter(tool => 
                tool.name.toLowerCase().includes(query)
            ).slice(0, 10);
            
            if (matches.length > 0) {
                mobileSearchResults.innerHTML = matches.map(tool => `
                    <a href="${tool.url}" style="display:block; padding:10px 12px; border-bottom:1px solid #eee; text-decoration:none; color:#333;">
                        <strong>${tool.name}</strong><br>
                        <small style="color:#888;">${tool.category}</small>
                    </a>
                `).join('');
            } else {
                mobileSearchResults.innerHTML = '<div style="padding:10px; color:#888;">No tools found</div>';
            }
        });
    }
    
    // Mobile Menu Toggle
    const mobileToggle = document.getElementById('mobileToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    
    if (mobileToggle && mobileMenu) {
        mobileToggle.addEventListener('click', function() {
            mobileMenu.classList.toggle('open');
        });
    }
});
</script>
</body>
</html>
