<!DOCTYPE html>
<html>
<head>
    <title>Instagram Video Downloader</title>
    <style>
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #1E3A8A 0%, #0D9488 100%);
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            padding: 30px;
        }
        input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 50px;
            border: 1px solid #ddd;
        }
        button {
            background: #0D9488;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .method {
            background: #f0fdf4;
            padding: 15px;
            border-radius: 16px;
            margin: 15px 0;
        }
        a {
            color: #0D9488;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📥 Instagram Video Downloader</h1>
    <p>Paste link & get download options</p>

    <input type="text" id="url" placeholder="Paste Instagram video/reel link...">
    <button onclick="process()">Get Download Link</button>

    <div id="result"></div>

    <div class="method">
        <strong>⚡ Alternative Methods (100% Working):</strong><br><br>
        📱 <strong>Mobile App:</strong><br>
        <a href="https://play.google.com/store/apps/details?id=de.mittermeier.felix.instagram_downloader" target="_blank">
            Download Instagram Downloader App
        </a><br><br>
        💻 <strong>Chrome Extension:</strong><br>
        <a href="https://chromewebstore.google.com/detail/post-exporter/jedadojkeieofinbpffchndbaphloein" target="_blank">
            Add to Chrome - Free
        </a>
    </div>
</div>

<script>
function process() {
    let url = document.getElementById('url').value;
    if (!url.includes('instagram.com')) {
        alert('Please enter valid Instagram URL');
        return;
    }
    
    // Remove extra parameters
    let cleanUrl = url.split('?')[0];
    
    document.getElementById('result').innerHTML = `
        <div class="method">
            <strong>✅ Try these working methods:</strong><br><br>
            <strong>Method 1:</strong> Add "dd" before instagram<br>
            <a href="https://www.dd${cleanUrl.replace('https://www.', '')}" target="_blank">
                ${cleanUrl.replace('instagram', 'ddinstagram')}
            </a><br>
            <small>👉 Open link → Right click video → Save video as</small><br><br>
            
            <strong>Method 2:</strong> Use SaveInsta (Free)<br>
            <a href="https://saveinsta.app/en" target="_blank">Open SaveInsta</a><br>
            <small>👉 Paste URL there → Click Download</small><br><br>
            
            <strong>Method 3:</strong> Mobile App (Easiest)<br>
            <a href="https://play.google.com/store/apps/details?id=de.mittermeier.felix.instagram_downloader" target="_blank">
                📱 Download App
            </a>
        </div>
    `;
}
</script>
</body>
</html>
